# このファイルは、アラートをDiscordに送信するための設定ファイルです。
# webhookの取得方法は、以下を参照してください
# https://support.discord.com/hc/ja/articles/228383668-Webhooks-%E3%81%AE%E4%BD%BF%E3%81%84%E6%96%B9
enabled: false
webhook: ""
# DiscordのURLフォーマット検証をバイパスするには `true` に設定します。
# これにより、任意の有効なHTTPS URLが許可されます（プロキシやMatrixフォワーダーに便利です）。
disable-webhook-validation: false
embed-title: "**Grim 警告**"
embed-color: "#00FFFF"
include-timestamp: true
# 値（クライアントのブランド名など）に含まれるバッククォート (`) を置換し、Discordのテキスト書式が崩れるのを防ぎます。
# この置換を無効にするには "`" を設定してください。
backtick-replacement-char: "ˋ"
violation-content:
    - "**プレイヤー**: `%player%`"
    - "**違反項目**: %check%"
    - "**違反回数**: %violations%"
    - "**クライアントバージョン**: %version%"
    - "**ブランド**: `%brand%`"
    - "**Ping**: %ping%"
    - "**TPS**: %tps%"
