# Webhook帮助: https://support.discord.com/hc/zh-cn/articles/228383668
enabled: false
webhook: ""
# 设置为 `true` 以绕过 Discord 的 URL 格式验证。
# 这将允许任何有效的 HTTPS URL（适用于代理或 Matrix 转发器）。
disable-webhook-validation: false
embed-title: "**Grim 警报**"
embed-color: "#00FFFF"
include-timestamp: true
# 替换变量值（如客户端品牌）中的反引号 (`)，以防止破坏 Discord 的文本格式。
# 将其设置为 "`" 即可禁用此替换。
backtick-replacement-char: "ˋ"
violation-content:
    - "**玩家名**: `%player%`"
    - "**检查**: %check%"
    - "**违规次数**: %violations%"
    - "**游戏版本**: %version%"
    - "**客户端品牌**: `%brand%`"
    - "**延迟**: %ping%"
    - "**TPS**: %tps%"
