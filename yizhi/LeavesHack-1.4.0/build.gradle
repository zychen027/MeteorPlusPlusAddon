plugins {
    id "fabric-loom" version "1.14-SNAPSHOT"
}

base {
    archivesName = properties["archives_base_name"] as String
    version = project.mod_version
    group = project.maven_group
}
loom {
    accessWidenerPath = file("src/main/resources/leavesHack.accesswidener")
}
repositories {
    maven {
        name = "Meteor Dev Releases"
        url = "https://maven.meteordev.org/releases"
    }
    maven {
        name = "Meteor Dev Snapshots"
        url = "https://maven.meteordev.org/snapshots"
    }
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
    }
}

dependencies {
    // Fabric
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    // Meteor
    modImplementation "meteordevelopment:meteor-client:${project.meteor_version}"
    modCompileOnly "meteordevelopment:baritone:${project.baritone_version}-SNAPSHOT"

    // Litematica dependencies
    modCompileOnly "maven.modrinth:malilib:0.21.10"
    modCompileOnly "maven.modrinth:litematica:0.19.60"

//    modImplementation files("lib/e.jar")
//    // IDE 补全
//    implementation files("lib/e.jar")

}

tasks {
    processResources {
        inputs.property "version", project.version
        inputs.property "mc_version", project.minecraft_version
        filesMatching("fabric.mod.json") {
            expand(
                    version: project.version,
                    mc_version: project.minecraft_version
            )
        }
    }

    jar {
        from("LICENSE") {
            rename { "${it}_${project.base.archivesName}" }
        }
    }

    java {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    tasks.withType(JavaCompile).configureEach {
        it.options.encoding = "UTF-8"
        it.options.release = 21
    }
}
